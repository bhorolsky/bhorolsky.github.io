<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bHorolsky - Socials</title>

  <!-- Simple CSS for clean, centered layout -->
  <style>
    /* Reset default margins and use full height */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #111; /* Dark background */
      color: #fff; /* White text */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Main nickname at top */
    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    /* Social links container */
    .socials {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
    }

    /* Style individual links */
    .socials a {
      color: #00aaff; /* Nice blue for links */
      text-decoration: none;
      font-size: 1.25rem;
      transition: color 0.3s;
    }

    .socials a:hover {
      color: #ffaa00; /* Highlight on hover */
    }

    /* Optional small footer */
    footer {
      position: absolute;
      bottom: 1rem;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- Main nickname -->
  <h1>bHorolsky</h1>

  <!-- Social links -->
  <div class="socials">
    <a href="https://discord.com/users/794950795128864779" target="_blank">Discord DM</a>
    <a href="https://www.youtube.com/channel/UCbk1Sj712nB4lHP2KnoI4Pw" target="_blank">YouTube</a>
    <a href="https://bhorolsky.bsky.social" target="_blank">Bluesky</a>
    <a href="https://github.com/bhorolsky" target="_blank">GitHub</a>
    <a href="https://steamcommunity.com/profiles/76561199251299740" target="_blank">Steam</a>
    <a href="https://www.twitch.tv/bhorolsky" target="_blank">Twitch</a>
  </div>

</body>
</html>
